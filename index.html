<!DOCTYPE html>
<html>
<head>
    <script src="https://connect-cdn.atl-paas.net/all.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@atlaskit/css-reset@latest"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h3>Project Staffing</h3>
        <table id="staffing-table">
            <thead>
                <tr>
                    <th>User</th>
                    <th>%</th>
                </tr>
            </thead>
            <tbody id="rows">
                <tr class="staff-row">
                    <td>
                        <select class="user-select">
                            <option>Loading...</option>
                        </select>
                    </td>
                    <td>
                        <input type="number" class="percent-input" value="100">
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="button-group">
            <button id="add-row" class="aui-button">Add</button>
            <button id="save-btn" class="aui-button-primary">Save</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
